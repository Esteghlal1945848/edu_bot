version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edu_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    
    environment:
      - BOT_TOKEN=8913096480:AAFmE9zPmg7bso-jc0knSgoclt688lJSZlo
      - ADMIN_IDS=7336595194
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=edu_archive
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_password
      - WEB_PANEL_HOST=0.0.0.0
      - WEB_PANEL_PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: